<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusSN — Nouveau mot de passe</title>
  <style>
    :root { --primary:#6D28D9; --bg:#F7F7FB; --card:#FFFFFF; --text:#1F2933; --muted:#6B7280; --border:#E5E7EB; --green:#16A34A; --red:#DC2626; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    .wrap { max-width:440px; margin:0 auto; padding:56px 20px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; }
    .logo { font-size:26px; font-weight:800; color:var(--primary); letter-spacing:-0.5px; text-align:center; margin-bottom:28px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px 26px; }
    .card h1 { margin:0 0 8px; font-size:20px; }
    .card p { margin:0 0 20px; color:var(--muted); font-size:14px; }
    label { display:block; font-size:13px; font-weight:600; margin:0 0 6px; }
    input { width:100%; padding:12px 14px; font-size:15px; border:1px solid var(--border); border-radius:10px; margin-bottom:14px; }
    button { width:100%; padding:13px; font-size:15px; font-weight:700; color:#fff; background:var(--primary); border:none; border-radius:12px; cursor:pointer; }
    button:disabled { opacity:.55; cursor:default; }
    .msg { font-size:14px; margin-top:14px; padding:12px; border-radius:10px; display:none; }
    .msg.ok { background:#DCFCE7; color:var(--green); display:block; }
    .msg.err { background:#FEE2E2; color:var(--red); display:block; }
    .check { width:64px;height:64px;border-radius:50%;background:#DCFCE7;display:none;align-items:center;justify-content:center;margin:0 auto 16px;font-size:34px;color:var(--green); }
    footer { text-align:center; color:var(--muted); font-size:12px; margin-top:22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">CampusSN</div>
    <div class="card">
      <div class="check" id="check">&#10003;</div>
      <h1 id="title">Nouveau mot de passe</h1>
      <p id="subtitle">Choisis un nouveau mot de passe pour ton compte CampusSN.</p>
      <form id="form">
        <label for="pw">Nouveau mot de passe</label>
        <input type="password" id="pw" autocomplete="new-password" placeholder="8 caractères min., 1 lettre + 1 chiffre" />
        <label for="pw2">Confirme le mot de passe</label>
        <input type="password" id="pw2" autocomplete="new-password" />
        <button type="submit" id="submit">Mettre à jour</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>
    <footer>CampusSN &middot; <a href="mailto:support@campussn.com" style="color:var(--primary);text-decoration:none;">support@campussn.com</a></footer>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://wiymdhcbmpbngyplpboc.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpeW1kaGNibXBibmd5cGxwYm9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzM1NjYsImV4cCI6MjA5NzAwOTU2Nn0.NFuu4IWqNXO7xFP7sfd4cEmZCWhQMcchY_AndyfTrtY';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { detectSessionInUrl: true, flowType: 'implicit', persistSession: false },
    });

    const $ = (id) => document.getElementById(id);
    const msg = $('msg');
    const form = $('form');

    function show(type, text) { msg.className = 'msg ' + type; msg.textContent = text; }
    function fail(text) { show('err', text); }

    // Vérifie qu'on a bien un contexte de récupération (token dans l'URL).
    let hasRecovery = false;
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || session) hasRecovery = true;
    });
    // Filet : après un court délai, si pas de session, lien invalide/expiré.
    setTimeout(async () => {
      const { data } = await supabase.auth.getSession();
      if (!data.session && !location.hash.includes('access_token')) {
        form.style.display = 'none';
        $('subtitle').textContent = '';
        fail("Lien invalide ou expiré. Refais une demande de réinitialisation depuis l'application.");
      }
    }, 1200);

    function valid(pw) { return pw.length >= 8 && /[A-Za-z]/.test(pw) && /[0-9]/.test(pw); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = $('pw').value, pw2 = $('pw2').value;
      if (!valid(pw)) return fail('Mot de passe trop faible : 8 caractères min., au moins 1 lettre et 1 chiffre.');
      if (pw !== pw2) return fail('Les deux mots de passe ne correspondent pas.');
      $('submit').disabled = true; show('', ''); msg.className = 'msg';
      const { error } = await supabase.auth.updateUser({ password: pw });
      if (error) { $('submit').disabled = false; return fail('Erreur : ' + error.message); }
      // Succès
      form.style.display = 'none';
      $('check').style.display = 'flex';
      $('title').textContent = 'Mot de passe mis à jour !';
      $('subtitle').textContent = '';
      show('ok', 'Tu peux maintenant retourner dans l’application CampusSN et te connecter avec ton nouveau mot de passe.');
      try { history.replaceState(null, document.title, location.pathname); } catch (_) {}
    });
  </script>
</body>
</html>
