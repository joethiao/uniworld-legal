<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusSN — E-mail confirmé</title>
  <style>
    :root { --primary:#6D28D9; --bg:#F7F7FB; --card:#FFFFFF; --text:#1F2933; --muted:#6B7280; --border:#E5E7EB; --green:#16A34A; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    .wrap { max-width:480px; margin:0 auto; padding:64px 20px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; }
    .logo { font-size:26px; font-weight:800; color:var(--primary); letter-spacing:-0.5px; text-align:center; margin-bottom:32px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px 28px; text-align:center; }
    .check { width:72px; height:72px; border-radius:50%; background:#DCFCE7; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:38px; color:var(--green); }
    .card h1 { margin:0 0 10px; font-size:21px; color:var(--text); }
    .card p { margin:0 0 8px; color:var(--muted); font-size:15px; }
    .hint { margin-top:22px; font-size:13px; color:#9CA3AF; }
    footer { text-align:center; color:var(--muted); font-size:13px; margin-top:28px; }
    footer a { color:var(--primary); text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">CampusSN</div>
    <div class="card">
      <div class="check">&#10003;</div>
      <h1>Ton adresse e-mail est confirmee !</h1>
      <p>Ton compte CampusSN est maintenant actif.</p>
      <p><strong>Retourne dans l'application et connecte-toi</strong> pour commencer.</p>
      <div class="hint">Tu peux fermer cet onglet.</div>
    </div>
    <footer>CampusSN &middot; Le reseau des etudiants &middot; <a href="mailto:support@campussn.com">support@campussn.com</a></footer>
  </div>
  <script>
    // Nettoie le fragment (#access_token=...) de la barre d'adresse pour ne pas
    // laisser trainer le jeton de session dans l'URL visible.
    if (window.location.hash) {
      history.replaceState(null, document.title, window.location.pathname + window.location.search);
    }
  </script>
</body>
</html>
